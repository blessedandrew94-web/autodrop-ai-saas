<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | GlowHome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-white border-b border-gray-100 p-4">
        <div class="max-w-7xl mx-auto flex items-center">
            <a href="/" class="text-2xl font-bold tracking-tight text-teal-600">Glow<span class="text-gray-900">Home</span></a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold mb-8">Secure Checkout</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <!-- Order Summary -->
            <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm order-last md:order-first">
                <h2 class="text-xl font-bold mb-6">Order Summary</h2>
                <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-50">
                    <div>
                        <p class="font-semibold">{{ product.name }}</p>
                        <p class="text-sm text-gray-500">Qty: 1</p>
                    </div>
                    <p class="font-bold">${{ product.price }}</p>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between text-gray-600">
                        <span>Subtotal</span>
                        <span>${{ product.price }}</span>
                    </div>
                    <div class="flex justify-between text-gray-600">
                        <span>Shipping</span>
                        <span class="text-teal-600 font-semibold">FREE</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold pt-4 border-t border-gray-100">
                        <span>Total</span>
                        <span>${{ product.price }}</span>
                    </div>
                </div>
            </div>

            <!-- Checkout Form -->
            <div>
                <h2 class="text-xl font-bold mb-6">Customer Information</h2>
                <form id="checkout-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Email Address</label>
                        <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Full Name</label>
                        <input type="text" id="name" name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <h2 class="text-xl font-bold mt-8 mb-6">Shipping Address</h2>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Address</label>
                        <input type="text" id="address" name="address" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-2">City</label>
                            <input type="text" id="city" name="city" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-2">Zip Code</label>
                            <input type="text" id="zip" name="zip" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
                        </div>
                    </div>

                    <div class="mt-8">
                        <a href="https://linktr.ee/DensVibez" class="block w-full bg-teal-600 text-white text-center px-8 py-4 rounded-xl font-bold hover:bg-teal-700 transition shadow-lg">View More on Linktree</a>
                    </div>
                </form>
                <p class="text-center text-xs text-gray-400 mt-4">Directing to owner's official links</p>
            </div>
        </div>
    </div>

    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '{{ product.price }}'
                        },
                        description: '{{ product.name }}'
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    // Submit the form data to our backend after successful payment
                    const email = document.getElementById('email').value;
                    const formData = new FormData();
                    formData.append('email', email);
                    formData.append('quantity', 1);

                    fetch('/checkout?product_id={{ request.args.get('product_id', 'flame-humidifier') }}', {
                        method: 'POST',
                        body: formData
                    }).then(response => {
                        window.location.href = "/success";
                    });
                });
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
